# infra/karpenter/provisioner-cpu.yaml
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2023
  amiSelectorTerms:
    - alias: al2023@latest
  role: KarpenterNodeRole-rag-platform-cluster
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: rag-platform-cluster
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: rag-platform-cluster
  tags:
    karpenter.sh/discovery: rag-platform-cluster
    Project: Enterprise-RAG
    Environment: prod
  # Default 20GB root volume is too small for ML images (Ray GPU = 15GB+ uncompressed).
  # 100GB gp3 gives headroom for image layers + model weights downloaded at runtime.
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        deleteOnTermination: true
        encrypted: true
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: cpu
spec:
  template:
    metadata:
      labels:
        workload-tier: cpu
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: ["m6i", "c6i", "r6i"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
  limits:
    cpu: "1000"
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s

# deploy/helm/qdrant/values.yaml

# Cluster Mode: Run 3 replicas for fault tolerance
replicaCount: 3

config:
  storage:
    # Use Memmap for storage (stores vectors on disk but maps to RAM)
    # Allows handling datasets larger than RAM.
    on_disk_payload: true
  
  service:
    enable_tls: false # TLS handled by Ingress/Mesh

resources:
  requests:
    cpu: "2"
    memory: "4Gi"
  limits:
    cpu: "4"
    memory: "8Gi"

# Persistence: Use fast SSDs (io1 or gp3)
persistence:
  size: 50Gi
  storageClassName: gp3
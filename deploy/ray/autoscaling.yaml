# deploy/ray/autoscaling.yaml
# Informational Ray autoscaling settings kept as a Kubernetes object so
# `kubectl apply -f deploy/ray/` can apply the whole directory.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ray-autoscaling-config
  namespace: default
data:
  autoscaling.yaml: |
    autoscaling:
      enabled: true
      upscaling_speed: 1.0
      idle_timeout_minutes: 5
      worker_nodes:
        cpu_worker_group:
          min_workers: 1
          max_workers: 50
          resources: {"CPU": 8, "memory": "32Gi"}
        gpu_worker_group:
          min_workers: 0
          max_workers: 20
          resources: {"CPU": 4, "memory": "32Gi", "GPU": 1}

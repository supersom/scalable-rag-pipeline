# deploy/ray/ray-serve-llm.yaml
apiVersion: ray.io/v1
kind: RayService
metadata:
  name: llm-service
spec:
  serviceUnhealthySecondThreshold: 900 # Allow 15 mins for model download/load
  deploymentUnhealthySecondThreshold: 900

  serveService:
    metadata:
      name: llm-service
    spec:
      type: ClusterIP
      ports:
      - port: 8000
        targetPort: 8000

  rayClusterConfig:
    rayVersion: '2.9.0'
    enableInTreeAutoscaling: true
    headGroupSpec:
      serviceType: ClusterIP
      rayStartParams:
        dashboard-host: '0.0.0.0'
        num-cpus: '0'
      template:
        spec:
          containers:
          - name: ray-head
            image: 764988411032.dkr.ecr.us-east-1.amazonaws.com/services/ray-serve:b538354-v3
            resources:
              limits:
                cpu: '2'
                memory: 8Gi
              requests:
                cpu: '2'
                memory: 8Gi
            ports:
            - containerPort: 6379
            - containerPort: 8265
    workerGroupSpecs:
    - groupName: gpu-workers
      replicas: 0
      minReplicas: 0
      maxReplicas: 20
      rayStartParams: {}
      template:
        spec:
          containers:
          - name: ray-worker
            image: 764988411032.dkr.ecr.us-east-1.amazonaws.com/services/ray-serve:b538354-v3
            resources:
              limits:
                cpu: '4'
                memory: 32Gi
                nvidia.com/gpu: 1
              requests:
                cpu: '4'
                memory: 32Gi
                nvidia.com/gpu: 1
          nodeSelector:
            karpenter.k8s.aws/instance-category: 'g'
          tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule

  serveConfigV2: |
    applications:
      - name: llama3
        import_path: services.api.app.models.vllm_engine:app
        route_prefix: /llm
        # vllm/torch/app-code are baked into the custom image, so no pip here.
        # Deployment config is read from these env vars by vllm_engine.build_app().
        runtime_env:
          env_vars:
            # Ungated 8B mirror — fits one A10G (24GB) at fp16, no tensor parallelism.
            # For the real 70B: raise GPU quota, set tensor_parallel_size, and switch this.
            MODEL_ID: "NousResearch/Meta-Llama-3-8B-Instruct"
            LLM_MAX_MODEL_LEN: "8192"
            LLM_GPU_MEMORY_UTILIZATION: "0.90"
            # vLLM v1 engine in this version mishandles EngineArgs — force the stable v0 engine.
            VLLM_USE_V1: "0"
        deployments:
          - name: LLMDeployment
            autoscaling_config:
              min_replicas: 1
              max_replicas: 10
              target_num_ongoing_requests_per_replica: 20
            ray_actor_options:
              num_cpus: 4
              num_gpus: 1 # 1 A10G per replica
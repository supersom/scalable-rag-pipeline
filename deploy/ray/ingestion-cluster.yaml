apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: ingestion-ray
  namespace: default
spec:
  rayVersion: "2.9.0"
  enableInTreeAutoscaling: true
  headGroupSpec:
    serviceType: ClusterIP
    rayStartParams:
      dashboard-host: "0.0.0.0"
      num-cpus: "0"
    template:
      spec:
        serviceAccountName: ingestion-worker
        containers:
          - name: ray-head
            image: INGESTION_IMAGE
            resources:
              requests: {cpu: "1", memory: 2Gi}
              limits: {cpu: "2", memory: 4Gi}
            ports:
              - containerPort: 6379
              - containerPort: 8265
  workerGroupSpecs:
    - groupName: cpu-workers
      replicas: 0
      minReplicas: 0
      maxReplicas: 20
      rayStartParams: {}
      template:
        spec:
          serviceAccountName: ingestion-worker
          containers:
            - name: ray-worker
              image: INGESTION_IMAGE
              resources:
                requests: {cpu: "4", memory: 12Gi}
                limits: {cpu: "4", memory: 12Gi}
          nodeSelector:
            karpenter.sh/nodepool: cpu
